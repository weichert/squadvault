name: CI

on:
  pull_request:
  push:
    branches: [ main ]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hypothesis>=6.100 ruff mypy

      - name: Compile check
        run: |
          python3 -c "
          import py_compile, glob, sys
          errors = []
          files = glob.glob('src/squadvault/**/*.py', recursive=True)
          for f in files:
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print(f'{len(errors)} compile errors:')
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f'All {len(files)} files compile clean')
          "

      - name: Lint
        run: ruff check src/squadvault/

      - name: Type check (core/)
        run: PYTHONPATH=src mypy src/squadvault/core/

      - name: Run tests
        run: PYTHONPATH=src python -m pytest Tests/ -q

      - name: Prove suite (legacy gates)
        run: bash scripts/prove_ci.sh
